<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support Daily Affirmations</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      color: #1a1a1a;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin: 0 0 30px;
      font-size: 16px;
      line-height: 1.5;
    }

    .buttons-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 30px;
    }

    .donation-btn {
      padding: 16px 20px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .donation-btn:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }

    .custom-section {
      border-top: 2px solid #eee;
      padding-top: 30px;
    }

    .custom-label {
      display: block;
      margin-bottom: 12px;
      color: #1a1a1a;
      font-weight: 600;
      font-size: 14px;
    }

    .custom-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 12px;
      transition: border-color 200ms ease;
    }

    .custom-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .custom-input::before {
      content: "$";
    }

    .custom-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .custom-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
    }

    .note {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #eee;
      color: #999;
      font-size: 13px;
      line-height: 1.6;
    }

    .heart {
      color: #ff6b6b;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 24px;
      }

      .buttons-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .donation-btn {
        padding: 14px 16px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Support This Project <span class="heart">❤️</span></h1>
    <p class="subtitle">
      Help keep Daily Affirmations free and growing. Your support means everything.
    </p>

    <div class="buttons-grid">
      <button class="donation-btn" onclick="donate(1)">☕ $1</button>
      <button class="donation-btn" onclick="donate(2)">🌟 $2</button>
      <button class="donation-btn" onclick="donate(5)">💝 $5</button>
      <button class="donation-btn" onclick="donate(10)">✨ $10</button>
    </div>

    <div class="custom-section">
      <label class="custom-label">Custom Amount (USD)</label>
      <input
        type="number"
        id="customAmount"
        class="custom-input"
        placeholder="Enter amount"
        min="1"
        max="10000"
        value=""
      >
      <button class="custom-btn" onclick="donateCustom()">Donate Custom Amount</button>
    </div>

    <div class="note">
      <strong>Note:</strong> Donations are processed through PayPal or your preferred payment provider.
      Your contribution directly supports development, hosting, and keeping this tool free for everyone.
    </div>
  </div>

  <script>
    function donate(amount) {
      const paypalLink = `https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=YOUR_PAYPAL_EMAIL&item_name=Daily+Affirmations+Donation&amount=${amount}&currency_code=USD&return=https://yoursite.com/thank-you`;

      // For now, show a placeholder (replace with real PayPal link)
      alert(`Thank you for your $${amount} donation!\n\nIn production, this would redirect to PayPal.\n\nReplace YOUR_PAYPAL_EMAIL in the code with your actual email.`);

      // Uncomment below when you have PayPal set up:
      // window.location.href = paypalLink;
    }

    function donateCustom() {
      const amount = document.getElementById('customAmount').value;

      if (!amount || amount < 1) {
        alert('Please enter a valid amount ($1 or more)');
        return;
      }

      if (amount > 10000) {
        alert('Please contact us for large donations');
        return;
      }

      donate(amount);
    }

    // Allow Enter key in custom input
    document.getElementById('customAmount').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        donateCustom();
      }
    });
  </script>
</body>
</html>
