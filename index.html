      function pad(number) {
        return String(number).padStart(2, "0");
      }

      function formatLocalDate(date) {
        return [
          date.getFullYear(),
          pad(date.getMonth() + 1),
          pad(date.getDate())
        ].join("");
      }

      function formatUtcTimestamp(date) {
        return [
          date.getUTCFullYear(),
          pad(date.getUTCMonth() + 1),
          pad(date.getUTCDate()),
          "T",
          pad(date.getUTCHours()),
          pad(date.getUTCMinutes()),
          pad(date.getUTCSeconds()),
          "Z"
        ].join("");
      }

      function addDays(date, amount) {
        const result = new Date(date);
        result.setDate(result.getDate() + amount);
        return result;
      }

      function escapeIcsText(value) {
        return String(value)
          .replace(/\\/g, "\\\\")
          .replace(/\r?\n/g, "\\n")
          .replace(/,/g, "\\,")
          .replace(/;/g, "\\;");
      }

      function foldIcsLine(line) {
        const encoder = new TextEncoder();
        const parts = [];
        let current = "";

        for (const character of line) {
          const candidate = current + character;

          if (encoder.encode(candidate).length > 73 && current) {
            parts.push(current);
            current = " " + character;
          } else {
            current = candidate;
          }
        }

        if (current) parts.push(current);
        return parts.join("\r\n");
      }

      function createCalendar() {
        if (affirmations.length !== 365 || new Set(affirmations).size !== 365) {
          throw new Error("The affirmation list must contain exactly 365 unique entries.");
        }

        const now = new Date();
        const tomorrow = new Date(
          now.getFullYear(),
          now.getMonth(),
          now.getDate() + 1
        );
        const timestamp = formatUtcTimestamp(now);
        const calendarId = `${timestamp}-${Math.random().toString(36).slice(2)}`;
        const lines = [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "PRODID:-//365 Day Affirmation Calendar//EN",
          "CALSCALE:GREGORIAN",
          "METHOD:PUBLISH",
          "X-WR-CALNAME:365 Days of Affirmations",
          "X-WR-CALDESC:A different positive affirmation every day for 365 days."
        ];

        affirmations.forEach((affirmation, index) => {
          const startDate = addDays(tomorrow, index);
          const endDate = addDays(startDate, 1);

          lines.push(
            "BEGIN:VEVENT",
            `UID:${calendarId}-${index + 1}@affirmation-calendar.local`,
            `DTSTAMP:${timestamp}`,
            `DTSTART;VALUE=DATE:${formatLocalDate(startDate)}`,
            `DTEND;VALUE=DATE:${formatLocalDate(endDate)}`,
            `SUMMARY:${escapeIcsText(affirmation)}`,
            `DESCRIPTION:${escapeIcsText(affirmation)}`,
            "TRANSP:TRANSPARENT",
            "STATUS:CONFIRMED",
            "END:VEVENT"
          );
        });

        lines.push("END:VCALENDAR");
        return lines.map(foldIcsLine).join("\r\n") + "\r\n";
      }

      function downloadCalendar() {
        button.disabled = true;

        try {
          const calendarText = createCalendar();
          const blob = new Blob([calendarText], {
            type: "text/calendar;charset=utf-8"
          });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");

          link.href = url;
          link.download = "365-day-affirmation-calendar.ics";
          document.body.appendChild(link);
          link.click();
          link.remove();

          window.setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch (error) {
          console.error(error);
        } finally {
          button.disabled = false;
        }
      }
